<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hazex Games Hub</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:#fff;
}

.navbar{
    display:flex;
    justify-content:space-between;
    padding:12px;
    background:#22c55e;
    color:#000;
}

.dashboard{
    padding:12px;
    margin:10px;
    background:#111827;
    border-radius:10px;
}

.stat{
    display:flex;
    justify-content:space-between;
    margin:6px 0;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    background:#22c55e;
}

/* INFO TEXT */
.info{
    font-size:12px;
    color:#9ca3af;
    margin-top:8px;
}

/* GAME */
#gameScreen{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    background:#000;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="navbar">
    <b>🎮 Hazex Hub</b>
    <div>💰 <span id="balance">0</span></div>
</div>

<div class="dashboard">
    <div class="stat">👤 Player ID: <span id="uid"></span></div>
    <div class="stat">⏳ Bonus Timer: <span id="timer">Ready</span></div>

    <button onclick="startGame()">▶ Play Game</button>
    <button onclick="claimReward()">🎯 Claim Play Reward</button>
    <button onclick="dailyBonus()">🎁 Daily Bonus</button>
    <button onclick="watchAd()">🎁 Bonus Reward</button>
    <button onclick="copyRef()">👥 Invite Friends</button>
    <button onclick="openWithdraw()">💸 Withdraw</button>

    <div class="info">
        *Bonus rewards are optional and do not affect gameplay.
    </div>
</div>

<div id="gameScreen">
<button onclick="exitGame()">⬅ Back</button>
<iframe id="frame"></iframe>
</div>

<div id="withdrawBox" style="display:none;padding:10px;">
<h3>Withdraw</h3>

<select id="method">
<option>Litecoin</option>
<option>USDT TRC20</option>
</select>

<input id="address" placeholder="Wallet Address" style="width:100%;padding:8px;margin-top:10px;">

<button onclick="submitWithdraw()">Submit</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random()*99999);
document.getElementById("uid").innerText = userId;

let balance = parseInt(localStorage.getItem("balance")) || 0;
document.getElementById("balance").innerText = balance;

/* =====================
   GAME SYSTEM
===================== */
let playStart = 0;

function startGame(){
    document.getElementById("gameScreen").style.display="block";
    document.getElementById("frame").src =
    "https://freeonlinegames.github.io/subway-surfers-tokyo/";

    playStart = Date.now();
}

function exitGame(){
    document.getElementById("gameScreen").style.display="none";
}

/* =====================
   PLAY REWARD (REAL)
===================== */
let lastPlay = localStorage.getItem("play") || 0;

function claimReward(){
    let now = Date.now();

    if(now - playStart < 60000){
        alert("Play at least 1 minute to earn reward");
        return;
    }

    if(now - lastPlay < 60000){
        alert("Wait before claiming again");
        return;
    }

    balance += 20;
    localStorage.setItem("balance",balance);
    document.getElementById("balance").innerText = balance;

    lastPlay = now;
    localStorage.setItem("play",lastPlay);
}

/* =====================
   DAILY BONUS
===================== */
let lastDaily = localStorage.getItem("daily") || 0;

function dailyBonus(){
    let now = Date.now();

    if(now - lastDaily < 86400000){
        alert("Daily bonus already claimed");
        return;
    }

    balance += 30;
    localStorage.setItem("balance",balance);
    document.getElementById("balance").innerText = balance;

    lastDaily = now;
    localStorage.setItem("daily",lastDaily);
}

/* =====================
   ADS (SAFE)
===================== */
let lastAd = 0;
let cooldown = 180000; // 3 minutes

function watchAd(){
    let now = Date.now();

    if(now - lastAd < cooldown){
        alert("Please wait before next bonus");
        return;
    }

    if(typeof Adsgram === "undefined") return;

    Adsgram.showRewardedAd({
        blockId:"YOUR_BLOCK_ID"
    }).then(()=>{
        balance += 10;
        localStorage.setItem("balance",balance);
        document.getElementById("balance").innerText = balance;

        lastAd = now;
    });
}

/* =====================
   REFERRAL
===================== */
function copyRef(){
    let link = "https://t.me/YOURBOT?start="+userId;
    navigator.clipboard.writeText(link);
    alert("Invite link copied");
}

/* =====================
   WITHDRAW
===================== */
function openWithdraw(){
    document.getElementById("withdrawBox").style.display="block";
}

function submitWithdraw(){
    if(balance < 15000){
        alert("Minimum withdrawal is 15,000 points");
        return;
    }

    let method = document.getElementById("method").value;
    let address = document.getElementById("address").value;

    if(!address) return;

    tg.sendData(`Withdraw\n${method}\n${address}\nID:${userId}`);
}

/* =====================
   TIMER
===================== */
function updateTimer(){
    let now = Date.now();
    let diff = cooldown - (now - lastAd);

    document.getElementById("timer").innerText =
        diff > 0 ? Math.ceil(diff/1000)+"s" : "Ready";
}
setInterval(updateTimer,1000);
</script>

</body>
</html>
