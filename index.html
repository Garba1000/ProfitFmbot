<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hazex Games Hub</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:#fff;
}

.navbar{
    display:flex;
    justify-content:space-between;
    padding:12px;
    background:#22c55e;
    color:#000;
}

.dashboard{
    padding:12px;
    margin:10px;
    background:#111827;
    border-radius:10px;
}

.stat{
    display:flex;
    justify-content:space-between;
    margin:6px 0;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    background:#22c55e;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    padding:10px;
}

.card{
    background:#1f2933;
    padding:12px;
    border-radius:8px;
    text-align:center;
    cursor:pointer;
}

#gameScreen{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    background:#000;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="navbar">
    <b>🎮 Hazex Hub</b>
    <div>💰 <span id="bal">0</span></div>
</div>

<div class="dashboard">
    <div class="stat">👤 ID: <span id="uid"></span></div>
    <div class="stat">⏳ Bonus Timer: <span id="timer">Ready</span></div>

    <button onclick="claimPlayReward()">🎯 Claim Play Reward</button>
    <button onclick="watchAd()">🎁 Optional Bonus</button>
</div>

<div id="home">
<div class="games">
    <div class="card" onclick="playGame('subway')">Subway</div>
    <div class="card" onclick="playGame('pacman')">Pacman</div>
</div>
</div>

<div id="gameScreen">
<button onclick="exitGame()">⬅ Back</button>
<iframe id="frame"></iframe>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random()*99999);
document.getElementById("uid").innerText = userId;

let balance = parseInt(localStorage.getItem("bal")) || 0;
document.getElementById("bal").innerText = balance;

/* =====================
   GAME TRACKING
===================== */
let playStart = 0;

function playGame(name){
    document.getElementById("home").style.display="none";
    document.getElementById("gameScreen").style.display="block";

    playStart = Date.now();

    const games = {
        subway:"https://freeonlinegames.github.io/subway-surfers-tokyo/",
        pacman:"https://bward2.github.io/pacman-js/"
    };

    document.getElementById("frame").src = games[name];
}

function exitGame(){
    document.getElementById("home").style.display="block";
    document.getElementById("gameScreen").style.display="none";
}

/* =====================
   PLAY REWARD (REAL ENGAGEMENT)
===================== */
let lastClaim = localStorage.getItem("playClaim") || 0;

function claimPlayReward(){
    let now = Date.now();

    if(now - lastClaim < 60000){
        alert("Play longer to earn reward");
        return;
    }

    if(now - playStart < 60000){
        alert("Play at least 1 minute");
        return;
    }

    balance += 20;
    localStorage.setItem("bal", balance);
    document.getElementById("bal").innerText = balance;

    lastClaim = now;
    localStorage.setItem("playClaim", lastClaim);
}

/* =====================
   ADS (SAFE USE)
===================== */
let adCooldown = 180000; // 3 mins
let lastAd = 0;

function watchAd(){
    let now = Date.now();

    if(now - lastAd < adCooldown){
        alert("Wait before next bonus");
        return;
    }

    if(typeof Adsgram === "undefined") return;

    Adsgram.showRewardedAd({
        blockId:"YOUR_BLOCK_ID"
    }).then(()=>{
        balance += 10;
        localStorage.setItem("bal", balance);
        document.getElementById("bal").innerText = balance;

        lastAd = now;
    });
}

/* =====================
   TIMER UI
===================== */
function updateTimer(){
    let now = Date.now();
    let diff = adCooldown - (now - lastAd);

    document.getElementById("timer").innerText =
        diff > 0 ? Math.ceil(diff/1000)+"s" : "Ready";
}
setInterval(updateTimer,1000);
</script>

</body>
</html>
